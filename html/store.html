<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tienda de Videojuegos - Explora Nuestra Colección</title>
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- HEADER -->
    <header>
      <a href="index.html" class="logo">ENEBA CLONE</a>

      <div class="search-bar">
        <input type="text" placeholder="Buscar juegos..." />
        <button type="button">Buscar</button>
      </div>

      <nav class="nav-links">
        <a href="store.html">Tienda</a>
        <a href="#">Login</a>
        <a href="#" class="cart-icon"> 🛒 <span class="cart-count">0</span> </a>
      </nav>
    </header>

    <!-- MAIN -->
    <main>
      <h1 class="page-title">Catálogo de Juegos</h1>

      <div class="store-layout">
        <!-- SIDEBAR -->
        <aside class="sidebar">
          <form id="filter-form">
            <div class="filter-group">
              <h4>Plataforma</h4>
              <div class="checkbox-group">
                <label
                  ><input type="radio" name="platform" value="" checked />
                  Todas</label
                >
                <label
                  ><input type="radio" name="platform" value="PC" /> PC</label
                >
                <label
                  ><input type="radio" name="platform" value="PlayStation" />
                  PlayStation</label
                >
                <label
                  ><input type="radio" name="platform" value="Xbox" />
                  Xbox</label
                >
                <label
                  ><input type="radio" name="platform" value="Switch" />
                  Switch</label
                >
              </div>
            </div>

            <div class="filter-group">
              <h4>Precio (€)</h4>
              <div class="price-inputs">
                <input type="number" placeholder="Min" min="0" />
                <span>-</span>
                <input type="number" placeholder="Max" min="0" />
              </div>
            </div>

            <button type="button" class="btn-filter">Aplicar Filtros</button>
          </form>
        </aside>

        <!-- PRODUCTOS -->
        <section class="products-grid">
          <article class="product-card">
            <span class="discount-badge">-15%</span>
            <span class="platform-badge">Xbox</span>
            <img src="https://placehold.co/400x500" alt="Juego Xbox" />
            <div class="product-info">
              <h3>Juego Sorprendente</h3>
              <div class="price">
                <span class="old">39.99€</span>
                <span class="new">33.99€</span>
              </div>
            </div>
          </article>

          <article class="product-card">
            <span class="platform-badge">PC</span>
            <img src="https://placehold.co/400x500" alt="Juego PC" />
            <div class="product-info">
              <h3>Otro Juego Normal</h3>
              <div class="price">
                <span class="new">29.99€</span>
              </div>
            </div>
          </article>
        </section>
      </div>
    </main>

    <!-- FOOTER -->
    <footer>
      <p>&copy; 2026 Eneba Clone MVP. Proyecto Educativo.</p>
      <p>Hecho por Coraima Mera Rodriguez</p>
    </footer>
  </body>
</html>
